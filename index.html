// ═══ Scroll Reveal ═══
const useReveal = () => {
  const ref = useRef(null); const [v,setV] = useState(false);
  useEffect(() => { const el=ref.current; if(!el)return; const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setV(true)},{threshold:.12}); o.observe(el); return ()=>o.disconnect(); },[]);
  return [ref,v];
};

  return null;

// ─── 智能兜底：永远不说「不知道」 ───
const fallbackReplies = [
  `🤔 这个问题角度清奇！\n\n不过我感觉你可能想了解的是：\n• 我们的服务价格？\n• 合作流程？\n• 某个行业方案？\n\n换个方式说说看，我一定能帮到你！`,
  `哈哈，这个问题把我问住了 0.1 秒 😅\n\n不过小炬绝不认输！你可以试试问：\n• 「做个官网多少钱」\n• 「小程序有哪些套餐」\n• 「你们跟模板站有什么区别」\n\n我随时待命！`,
  `有意思的问题！👀\n\n虽然不在我的标准题库里，但我猜你想问的可能是我们的某项服务？\n\n要不直接点，问「价格」「周期」「案例」这些关键词，我秒回！\n\n或者直接加老板微信 ${C.wechat}，让真人跟你聊～`,
  `嗯…这个问题我需要修炼一下才能完美回答 🧘\n\n不过别走！试试问我这些：\n💰 报价 | ⏱️ 周期 | 🏨 行业方案 | 🤝 怎么合作\n\n我对这些可是了如指掌！`,
];

// ═══ AI Assistant ═══
const AIAssistant = () => {
  const [op,setOp]=useState(false);
  const [ms,setMs]=useState([{role:"assistant",content:`👋 嗨！我是小炬，${C.brand} 的数字门面担当\n\n💰 做官网 ¥3,800 起\n📱 小程序 ¥5,800 起\n📦 源码交付，绝无隐形费用\n🏨 三亚 50+ 民宿客户\n\n有啥想了解的？随便问！`}]);
  const [inp,setInp]=useState("");const[ty,setTy]=useState(false);
  const [sg,setSg]=useState(["你们做什么的","做个官网多少钱","小程序怎么收费"]);
  const ce=useRef(null);const ir=useRef(null);const[vc,setVc]=useState(0);
  useEffect(()=>{ce.current?.scrollIntoView({behavior:"smooth"})},[ms,ty,sg]);
  useEffect(()=>{if(op)ir.current?.focus()},[op]);
  const sd=async(to)=>{const t=(typeof to==="string"?to:inp).trim();if(!t)return;if(typeof to==="string")setInp(t);const u={role:"user",content:t};const nm=[...ms,u];setMs(nm);setInp("");setSg([]);setTy(true);setVc(c=>c+1);
    const m=M(t);let rp;
    if(m){rp=typeof m.r.r==="function"?m.r.r({vc}):m.r.r;if(m.r.s)setSg(m.r.s)}
    else{rp=fallbackReplies[Math.floor(Math.random()*fallbackReplies.length)];setSg(["了解服务价格","看看合作流程","预约免费评估"])}
    await new Promise(r=>setTimeout(r,500+Math.random()*700));setTy(false);setMs(p=>[...p,{role:"assistant",content:rp}])};
  const hk=(e)=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sd()}};
  return (<>
    <button onClick={()=>setOp(!op)} aria-label="AI助手" style={{position:"fixed",bottom:28,right:28,zIndex:998,width:op?48:72,height:op?48:48,borderRadius:op?"50%":28,border:"none",cursor:"pointer",background:op?"rgba(0,20,40,0.92)":"linear-gradient(135deg, #00e5ff, #64ffda)",boxShadow:op?"0 0 30px rgba(0,229,255,0.2)":"0 0 40px rgba(0,229,255,0.5)",transition:"all 0.35s ease",display:"flex",alignItems:"center",justifyContent:"center",gap:op?0:6,padding:op?0:"0 16px 0 10px",overflow:"hidden"}} onMouseEnter={e=>{if(!op){e.target.style.boxShadow="0 0 65px rgba(0,229,255,0.6)";e.target.style.transform="scale(1.06)"}}} onMouseLeave={e=>{if(!op){e.target.style.boxShadow="0 0 40px rgba(0,229,255,0.5)";e.target.style.transform="scale(1)"}}}>
      {op?<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>:<><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000a14" strokeWidth="2.2"><path d="M12 2a4 4 0 014 4c0 2-2 4-4 7-2-3-4-5-4-7a4 4 0 014-4z"/><circle cx="12" cy="6" r="1.3"/></svg><span style={{color:"#000a14",fontSize:15,fontWeight:800}}>AI</span></>}
    </button>
    <div style={{position:"fixed",bottom:100,right:28,zIndex:997,width:380,maxWidth:"calc(100vw - 56px)",height:520,maxHeight:"calc(100vh - 140px)",background:"linear-gradient(180deg, rgba(0,20,50,0.96), rgba(0,10,30,0.98))",border:"1px solid rgba(0,180,200,0.15)",borderRadius:20,backdropFilter:"blur(24px)",display:"flex",flexDirection:"column",opacity:op?1:0,transform:op?"translateY(0) scale(1)":"translateY(20px) scale(0.95)",pointerEvents:op?"auto":"none",transition:"all 0.35s ease",boxShadow:"0 20px 60px rgba(0,0,0,0.5)"}}>
      <div style={{padding:"16px 20px",borderBottom:"1px solid rgba(0,180,200,0.08)",display:"flex",alignItems:"center",gap:10}}><div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg, #00e5ff, #64ffda)",display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000a14" strokeWidth="2.5"><path d="M12 2a4 4 0 014 4c0 2-2 4-4 7-2-3-4-5-4-7a4 4 0 014-4z"/></svg></div><div><div style={{color:"#e0f7fa",fontSize:15,fontWeight:600}}>{C.brand} AI</div><div style={{color:"#508090",fontSize:12}}>{ty?"正在输入...":"在线 · 随时为你服务"}</div></div></div>
      <div style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:12}}>
        {ms.map((m,i)=>(<div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}><div style={{maxWidth:"85%",padding:"12px 16px",borderRadius:16,borderBottomRightRadius:m.role==="user"?4:16,borderBottomLeftRadius:m.role==="assistant"?4:16,background:m.role==="user"?"linear-gradient(135deg, #00e5ff, #00b8d4)":"rgba(0,50,80,0.4)",color:m.role==="user"?"#000a14":"#c0e8f0",fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap",border:m.role==="assistant"?"1px solid rgba(0,180,200,0.08)":"none"}}>{m.content}</div></div>))}
        {sg.length>0&&!ty&&(<div style={{display:"flex",flexWrap:"wrap",gap:8,paddingLeft:4}}>{sg.map((s,i)=>(<button key={i} onClick={()=>sd(s)} style={{padding:"8px 14px",fontSize:13,borderRadius:20,cursor:"pointer",background:"rgba(0,180,200,0.08)",border:"1px solid rgba(0,180,200,0.18)",color:"#80deea",fontFamily:"inherit",transition:"all 0.25s",whiteSpace:"nowrap"}} onMouseEnter={e=>{e.target.style.background="rgba(0,229,255,0.15)";e.target.style.borderColor="rgba(0,229,255,0.4)"}} onMouseLeave={e=>{e.target.style.background="rgba(0,180,200,0.08)";e.target.style.borderColor="rgba(0,180,200,0.18)"}}>{s}</button>))}</div>)}
        {ty&&(<div style={{display:"flex",justifyContent:"flex-start"}}><div style={{padding:"14px 18px",borderRadius:16,borderBottomLeftRadius:4,background:"rgba(0,50,80,0.4)",border:"1px solid rgba(0,180,200,0.08)",display:"flex",gap:5}}>{[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:"#00e5ff",animation:`dotBounce 1.3s ${i*.15}s infinite ease-in-out`}}/>)}</div></div>)}
        <div ref={ce}/>
      </div>
      <div style={{padding:"12px 16px",borderTop:"1px solid rgba(0,180,200,0.08)",display:"flex",gap:10}}>
        <input ref={ir} value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={hk} placeholder="输入你的问题..." style={{flex:1,padding:"12px 16px",background:"rgba(0,20,40,0.6)",border:"1px solid rgba(0,180,200,0.15)",borderRadius:12,color:"#e0f7fa",fontSize:14,outline:"none",fontFamily:"inherit"}} onFocus={e=>e.target.style.borderColor="#00e5ff"} onBlur={e=>e.target.style.borderColor="rgba(0,180,200,0.15)"}/>
        <button onClick={()=>sd()} disabled={!inp.trim()} style={{width:44,height:44,borderRadius:12,border:"none",cursor:inp.trim()?"pointer":"default",background:inp.trim()?"linear-gradient(135deg, #00e5ff, #64ffda)":"rgba(0,180,200,0.1)",display:"flex",alignItems:"center",justifyContent:"center",opacity:inp.trim()?1:.4}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000a14" strokeWidth="2.5"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
      </div>
    </div>
  </>);
};

// ═══ App ═══
const App = () => {
  const [sd,setSd] = useState(false);
  return (<div style={{fontFamily:"'Noto Sans SC',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",background:"#000a14",color:"#e0f7fa",minHeight:"100vh",overflowX:"hidden"}}>
    <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",opacity:sd?1:.35,transition:"opacity 1s ease"}}><DeepOceanCanvas/></div>
    {!sd&&<SplashScreen onEnter={()=>{setSd(true);document.body.style.overflow="auto"}}/>}
    <div style={{position:"relative",zIndex:1,opacity:sd?1:0,transform:sd?"translateY(0)":"translateY(40px)",transition:"opacity 0.8s ease 0.5s,transform 0.8s ease 0.5s"}}><Nav/><Hero/><Products/><About/><Contact/><Footer/></div>
    <AIAssistant/>
  </div>);
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
